version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: idbi_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: idbi_moments
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: idbi_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: idbi_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/idbi_moments
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkeyforidbibankapp12345!
      - JWT_EXPIRE_MINUTES=60
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL}
      - NVIDIA_MODEL=${NVIDIA_MODEL}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idbi_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pg_data:
